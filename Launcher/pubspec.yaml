name: kyber_launcher
version: 2.0.0-beta9+1
homepage: https://kyber.gg
publish_to: none
description: KYBER Launcher
resolution: workspace

environment:
  sdk: '>=3.11.0-93.1.beta <4.0.0'

dependencies:
  animations: ^2.0.11
  archive: ^4.0.2
  async: ^2.11.0
  audioplayers: ^6.1.0
  auto_size_text: ^3.0.0
  background_downloader:
    git: https://github.com/ArmchairDevelopers/background_downloader.git
  cached_network_image: ^3.3.1
  collection: ^1.19.1
  crypto: ^3.0.6
  dart_discord_rpc:
    git:
      url: https://github.com/alexmercerind/dart_discord_rpc.git
      ref: harmonoid
  dio: ^5.4.0
  dio_cache_interceptor: ^4.0.5
  http_cache_hive_store: ^5.0.1
  ffi: ^2.1.3
  file: ^7.0.1
  file_picker: 10.3.8
  file_selector: ^1.0.0
  fixnum: ^1.1.0
  fluent_ui:
    git:
      url: https://github.com/bdlukaa/fluent_ui.git
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_cache_manager: ^3.4.1
  flutter_fadein: ^2.0.0
  flutter_form_builder:
    git:
      url: https://github.com/flutter-form-builder-ecosystem/flutter_form_builder.git
      ref: 10.1.0
  flutter_inappwebview:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      path: flutter_inappwebview
  flutter_js:
    git:
      url: https://github.com/GSirma/flutter_js.git
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.6
  flutter_web_auth_2: ^5.0.0-alpha.1
  flutter_widget_from_html: ^0.17.0
  form_builder_validators: ^11.1.2
  freezed_annotation: any
  get_it: ^9.0.5
  go_router: ^17.0.0
  graphql_flutter: ^5.2.0-beta.8
  grpc: ^5.0.0
  hive_ce: any
  hive_ce_flutter: any
  html: ^0.15.4
  jiffy: ^6.2.1
  json_annotation: any
  kyber:
    path: ../Packages/kyber
  kyber_collection:
    path: ../Packages/kyber_collection
  logging: ^1.0.2
  nexus_bridge:
    path: ../Packages/nexus_bridge
  nexus_gql:
    path: ../Packages/nexus_gql
  oauth2_client: ^4.1.0
  package_info_plus: ^9.0.0
  protocol_handler:
    git:
      url: https://github.com/ArmchairDevelopers/protocol_handler.git
      ref: main
      path: 'packages/protocol_handler'
  path: ^1.9.0
  path_provider: ^2.0.9
  protobuf: ^6.0.0
  replay_bloc: ^0.3.0
  rxdart: ^0.28.0
  screen_retriever: ^0.2.0
  sentry_dio: ^9.5.0
  sentry_flutter: ^9.5.0
  sentry_logging: ^9.5.0
  slugify: ^2.0.0
  stream_transform: ^2.1.0
  super_drag_and_drop: ^0.9.1
  super_hot_key: ^0.9.1
  super_native_extensions: ^0.9.1
  super_sliver_list: ^0.4.1
  timeago: ^3.7.1
  tinycolor2: ^3.0.1
  toastification: ^3.0.1
  url_launcher: ^6.2.2
  uuid: ^4.2.2
  version: ^3.0.0
  video_player_win: ^3.1.1
  web_socket_channel: ^3.0.1
  win32: ^5.5.1
  window_manager: ^0.5.1
  window_to_front: ^0.0.3
  windows_taskbar: ^1.1.2
  win32_registry: ^2.1.0
  flutter_rust_bridge: any
  pool: ^1.5.2
  native_toolchain_rust: ^1.0.0+1
  hive: ^2.2.3
  local_hero: ^0.3.0
  vector_graphics: ^1.1.19
  media_kit_libs_video:
  media_kit_video:
    git:
      url: https://github.com/media-kit/media-kit
      path: media_kit_video
  crop_your_image: ^2.0.0
  rhttp: ^0.15.0

dependency_overrides:
  media_kit:
    git:
      url: https://github.com/media-kit/media-kit
      path: media_kit

dev_dependencies:
  build_runner: ^2.8.0
  ffigen: ^20.0.0
  flutter_gen_runner: ^5.4.0
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  freezed: ^3.0.4
  hive_ce_generator: ^1.9.0-pre.3
  json_serializable: any
  very_good_analysis: ^10.0.0
  vector_graphics_compiler: ^1.1.19

index_generator:
  exclude:
    - "**.g.dart"
  libraries:
    - directory_path: lib/core
    - directory_path: lib/shared/ui

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true
  line_length: 160

flutter_launcher_icons:
  windows:
    generate: true
    image_path: installer/kyber-logo-rpc.png
    icon_size: 256

flutter:
  fonts:
    - family: Aurebesh
      fonts:
        - asset: assets/fonts/Aurebesh.otf
    - family: IBM-Plex-Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Text.otf
        - asset: assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700
    - family: BattlefrontUI
      fonts:
        - asset: assets/fonts/Univers_Next_Pro_Medium_Condensed.ttf
        - asset: assets/fonts/Univers_Next_Pro_Medium_Condensed_Italic.ttf
  assets:
    - assets/
    - assets/ca/
    - assets/icons/
    - path: assets/icons/kbl-play-icon.svg
      transformers:
        - package: vector_graphics_compiler
    - path: assets/icons/kbl-play-icon-border.svg
      transformers:
        - package: vector_graphics_compiler
    - assets/icons/classes/
    - assets/icons/color_blindness/
    - assets/icons/factions/
    - assets/icons/heroes/
    - assets/icons/rank_border/
    - assets/icons/stats/
    - assets/icons/regions/
    - assets/icons/icon_lib/
    - assets/icons/join_button_greeble/l/
    - assets/icons/join_button_greeble/r/
    - assets/logos/
    - assets/fonts/
    - assets/sounds/
    - assets/images/
    - assets/images/maps/
    - assets/images/announcements/
    - assets/images/backgrounds/
    - assets/images/modes/
    - assets/images/settings/
    - assets/js/bundle.js
    - assets/videos/
  uses-material-design: true
